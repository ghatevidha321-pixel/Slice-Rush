<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Fruit Cut – Slice fruits in Classic, Time Attack, or Zen mode!" />
  <title>Fruit Cut 🍉 – Choose Your Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       FRUIT CUT – style.css
       Dark cinematic theme with glass-morphism UI
       ============================================= */
    
    /* ---------- Reset & Base ---------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      touch-action: none; /* prevent scroll on mobile during swipe */
      user-select: none;
      -webkit-user-select: none;
    }
    
    /* ---------- Canvas ---------- */
    #gameCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }
    
    /* ---------- HUD ---------- */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 24px;
      pointer-events: none;
      z-index: 10;
    }
    
    #scorePanel,
    #livesPanel {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 10px 20px;
      min-width: 100px;
      text-align: center;
    }
    
    .hud-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    
    #scoreValue {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 220, 50, 0.8);
      line-height: 1;
    }
    
    #heartsContainer {
      font-size: 20px;
      display: flex;
      gap: 4px;
      justify-content: center;
      align-items: center;
      margin-top: 4px;
    }
    
    .heart {
      display: inline-block;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    
    .heart.lost {
      opacity: 0.15;
      transform: scale(0.8);
      filter: grayscale(1);
    }
    
    /* ---------- Combo Panel ---------- */
    #comboPanel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20;
    }
    
    #comboText {
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #f9ca24, #f0932b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(249, 202, 36, 0.9));
      animation: comboAnim 0.4s ease-out;
    }
    
    @keyframes comboAnim {
      0%   { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(3deg);  opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }
    
    /* ---------- Overlay Screens ---------- */
    .overlay-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(5, 5, 20, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: opacity 0.4s ease;
    }
    
    .overlay-screen.hidden {
      display: none;
    }
    
    .screen-content {
      text-align: center;
      padding: 40px 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 60px rgba(100, 200, 255, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.12);
      max-width: 460px;
      width: 90%;
      animation: screenIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes screenIn {
      from { transform: scale(0.8) translateY(30px); opacity: 0; }
      to   { transform: scale(1)   translateY(0px);  opacity: 1; }
    }
    
    /* ---------- Start Screen ---------- */
    .fruit-logo {
      font-size: 72px;
      line-height: 1;
      animation: floatBounce 2.5s ease-in-out infinite;
    }
    
    @keyframes floatBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    
    .game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 900;
      margin: 12px 0 8px;
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 4px;
    }
    
    .game-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 28px;
      letter-spacing: 1px;
    }
    
    /* ---------- Game Over Screen ---------- */
    .game-over-emoji {
      font-size: 64px;
      animation: shakeIt 0.5s ease;
    }
    
    @keyframes shakeIt {
      0%,100% { transform: rotate(0); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
    }
    
    .game-over-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 4px;
      margin: 14px 0 24px;
      color: #ff6b6b;
      text-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
    }
    
    .score-display {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 30px;
      margin-bottom: 28px;
    }
    
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    
    .score-row + .score-row {
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 8px;
      padding-top: 16px;
    }
    
    .score-label {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .score-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #fff;
    }
    
    .score-num.best {
      background: linear-gradient(135deg, #f9ca24, #f0932b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* ---------- Button ---------- */
    .btn-primary {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 16px 48px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      color: #0a1a10;
      box-shadow:
        0 0 30px rgba(67, 233, 123, 0.4),
        0 4px 20px rgba(0, 0, 0, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      pointer-events: all;
    }
    
    .btn-primary:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow:
        0 0 50px rgba(67, 233, 123, 0.6),
        0 8px 30px rgba(0, 0, 0, 0.4);
    }
    
    .btn-primary:active {
      transform: scale(0.97) translateY(0);
    }
    
    /* ---------- Utility ---------- */
    .hidden { display: none !important; }
    
    /* ---------- Wide screen-content (for mode select) ---------- */
    .screen-content.wide { max-width: 780px; }
    
    /* ---------- Mode Grid ---------- */
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 24px 0;
    }
    
    .mode-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 22px 16px;
      border-radius: 20px;
      border: 2px solid transparent;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      pointer-events: all;
      color: #fff;
    }
    .mode-card:hover  { transform: translateY(-6px) scale(1.03); }
    .mode-card:active { transform: scale(0.97); }
    
    .mode-icon { font-size: 38px; line-height: 1; }
    
    .mode-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2px;
    }
    
    .mode-features {
      list-style: none;
      text-align: left;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-top: 6px;
      line-height: 1.9;
    }
    
    /* Classic – red/orange accent */
    .mode-classic {
      border-color: rgba(231,76,60,0.4);
      box-shadow: 0 0 24px rgba(231,76,60,0.12);
    }
    .mode-classic:hover { border-color: #e74c3c; box-shadow: 0 0 40px rgba(231,76,60,0.35); }
    .mode-classic .mode-name { color: #ff6b6b; }
    
    /* Time Attack – cyan/blue accent */
    .mode-time {
      border-color: rgba(52,152,219,0.4);
      box-shadow: 0 0 24px rgba(52,152,219,0.12);
    }
    .mode-time:hover { border-color: #3498db; box-shadow: 0 0 40px rgba(52,152,219,0.35); }
    .mode-time .mode-name { color: #74b9ff; }
    
    /* Zen – green accent */
    .mode-zen {
      border-color: rgba(46,213,115,0.4);
      box-shadow: 0 0 24px rgba(46,213,115,0.12);
    }
    .mode-zen:hover { border-color: #2ed573; box-shadow: 0 0 40px rgba(46,213,115,0.35); }
    .mode-zen .mode-name { color: #55efc4; }
    
    .hint-text {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    
    /* ---------- Timer Panel (Time Attack HUD) ---------- */
    #timerPanel {
      background: rgba(52,152,219,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(52,152,219,0.4);
      border-radius: 16px;
      padding: 10px 20px;
      min-width: 100px;
      text-align: center;
    }
    #timerValue {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #74b9ff;
      text-shadow: 0 0 20px rgba(116,185,255,0.8);
      line-height: 1;
    }
    #timerValue.urgent { color: #ff6b6b; text-shadow: 0 0 20px rgba(255,107,107,0.9); animation: pulse 0.4s ease infinite alternate; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    
    /* ---------- Mode Tag (Result Screen) ---------- */
    .mode-tag {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      padding: 5px 16px;
      border-radius: 50px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
    }
    
    /* ---------- Result Buttons ---------- */
    .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    
    .btn-secondary {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 14px 28px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.7);
      transition: all 0.15s ease;
      pointer-events: all;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.5); color: #fff; background: rgba(255,255,255,0.06); }
    
    /* ---------- Mobile Adjustments ---------- */
    @media (max-width: 600px) {
      .game-title    { font-size: 34px; }
      .screen-content { padding: 28px 20px; }
      .mode-grid     { grid-template-columns: 1fr; gap: 10px; }
      .mode-card     { flex-direction: row; padding: 16px 20px; text-align: left; gap: 14px; }
      .mode-features { display: none; }
      #scoreValue    { font-size: 22px; }
      #timerValue    { font-size: 22px; }
      #comboText     { font-size: 32px; }
      #hud           { padding: 10px 14px; }
      #scorePanel, #livesPanel, #timerPanel { padding: 8px 14px; min-width: 80px; }
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="scorePanel">
      <div class="hud-label">SCORE</div>
      <div id="scoreValue">0</div>
    </div>

    <!-- Timer (Time Attack only) -->
    <div id="timerPanel" class="hidden">
      <div class="hud-label">TIME</div>
      <div id="timerValue">60</div>
    </div>

    <!-- Lives (Classic only) -->
    <div id="livesPanel">
      <div class="hud-label">LIVES</div>
      <div id="heartsContainer">
        <span class="heart" id="heart1">❤️</span>
        <span class="heart" id="heart2">❤️</span>
        <span class="heart" id="heart3">❤️</span>
      </div>
    </div>

    <div id="comboPanel" class="hidden">
      <div id="comboText">COMBO x2</div>
    </div>
  </div>

  <!-- Start / Mode Select Screen -->
  <div id="startScreen" class="overlay-screen">
    <div class="screen-content wide">
      <div class="fruit-logo">🍉</div>
      <h1 class="game-title">FRUIT CUT</h1>
      <p class="game-subtitle">Choose your mode and start slicing</p>

      <div class="mode-grid">
        <!-- Classic -->
        <button class="mode-card mode-classic" data-mode="classic">
          <span class="mode-icon">⚔️</span>
          <span class="mode-name">CLASSIC</span>
          <ul class="mode-features">
            <li>💣 Bombs included</li>
            <li>❤️ 3 lives system</li>
            <li>📈 Difficulty scales</li>
          </ul>
        </button>

        <!-- Time Attack -->
        <button class="mode-card mode-time" data-mode="timeattack">
          <span class="mode-icon">⏱️</span>
          <span class="mode-name">TIME ATTACK</span>
          <ul class="mode-features">
            <li>⏳ 60 second timer</li>
            <li>🚫 No miss penalty</li>
            <li>🔥 Max combo score</li>
          </ul>
        </button>

        <!-- Zen -->
        <button class="mode-card mode-zen" data-mode="zen">
          <span class="mode-icon">🧘</span>
          <span class="mode-name">ZEN</span>
          <ul class="mode-features">
            <li>🍎 No bombs ever</li>
            <li>♾️ No game over</li>
            <li>✨ Pure practice</li>
          </ul>
        </button>
      </div>

      <p class="hint-text">🖱️ Hold &amp; drag to slice &nbsp;|&nbsp; 📱 Touch &amp; swipe on mobile</p>
    </div>
  </div>

  <!-- Game Over / Result Screen -->
  <div id="gameOverScreen" class="overlay-screen hidden">
    <div class="screen-content">
      <div id="resultEmoji" class="game-over-emoji">💥</div>
      <h2 id="resultTitle" class="game-over-title">GAME OVER</h2>
      <div id="modeTag" class="mode-tag">CLASSIC</div>
      <div class="score-display">
        <div class="score-row">
          <span class="score-label">Your Score</span>
          <span id="finalScore" class="score-num">0</span>
        </div>
        <div class="score-row best-row">
          <span class="score-label">Best Score</span>
          <span id="highScore" class="score-num best">0</span>
        </div>
      </div>
      <div class="result-btns">
        <button id="restartBtn" class="btn-primary">🔄 PLAY AGAIN</button>
        <button id="menuBtn" class="btn-secondary">🏠 MENU</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    //  FRUIT CUT — Full Game Script
    // ============================================================
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
    
    // Audio Context
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function beep(freq, type, dur, vol = 0.3) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }
    function playSlice() { beep(900,'sine',0.08,0.25); beep(400,'sine',0.12,0.1); }
    function playMiss() { beep(180,'sawtooth',0.25,0.2); }
    function playGameOver() { [350,250,180,100].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.22,0.3),i*150)); }
    function playBomb() {
      if (!audioCtx) return;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.35, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
      const s=audioCtx.createBufferSource(), g=audioCtx.createGain();
      g.gain.value=0.9; s.buffer=buf; s.connect(g); g.connect(audioCtx.destination); s.start();
    }
    
    const CFG = {
      maxLives:3, spawnMinBase:800, spawnMaxBase:1200, minSpawn:380,
      gravity:0.18, trailLen:22, particleCount:20, diffEvery:20000,
      fruits:[
        {emoji:'🍎',color:'#e74c3c',shine:'#ff8a80',pts:10},
        {emoji:'🍊',color:'#e67e22',shine:'#ffb74d',pts:10},
        {emoji:'🍋',color:'#f1c40f',shine:'#fff176',pts:15},
        {emoji:'🍇',color:'#8e44ad',shine:'#ce93d8',pts:20},
        {emoji:'🍓',color:'#c0392b',shine:'#ef9a9a',pts:15},
        {emoji:'🍑',color:'#e8a87c',shine:'#ffccbc',pts:20},
        {emoji:'🥝',color:'#27ae60',shine:'#a5d6a7',pts:25},
        {emoji:'🍌',color:'#f9ca24',shine:'#fff9c4',pts:15},
        {emoji:'🍉',color:'#2ecc71',shine:'#b9f6ca',pts:30},
      ],
    };
    
    let fruits=[], parts=[], halves=[], juice=[], popups=[], trail=[];
    let score=0, lives=CFG.maxLives, highScore=0;
    let combo=0, lastSliceTime=0, speedMult=1, spawnMin=CFG.spawnMinBase, spawnMax=CFG.spawnMaxBase;
    let nextSpawn=0, gameState='start', gameStartTime=0;
    let shakeF=0, shakeMag=0, isSlicing=false, rafId=null;
    let gameMode='classic';
    const TIME_ATTACK_SECS=60;
    
    // DOM refs
    const hudEl=document.getElementById('hud'), scoreVal=document.getElementById('scoreValue'), comboPanel=document.getElementById('comboPanel'), comboText=document.getElementById('comboText');
    const startScreen=document.getElementById('startScreen'), gameOverScreen=document.getElementById('gameOverScreen'), finalScoreEl=document.getElementById('finalScore'), highScoreEl=document.getElementById('highScore');
    const heartEls=[document.getElementById('heart1'),document.getElementById('heart2'),document.getElementById('heart3')];
    const timerPanel=document.getElementById('timerPanel'), timerVal=document.getElementById('timerValue'), livesPanel=document.getElementById('livesPanel');
    const resultEmoji=document.getElementById('resultEmoji'), resultTitle=document.getElementById('resultTitle'), modeTag=document.getElementById('modeTag');
    
    function updateScoreUI(){ scoreVal.textContent=score; if(combo>=2){ comboPanel.classList.remove('hidden'); comboText.textContent=`COMBO ×${combo}`; comboText.style.animation='none'; requestAnimationFrame(()=>comboText.style.animation=''); } }
    function updateLivesUI(){ heartEls.forEach((e,i)=>e.classList.toggle('lost',i>=lives)); }
    function loseLife(){ lives--; updateLivesUI(); if(lives<=0 && gameState==='playing') endGame(); }
    function shake(mag,frames){ shakeMag=mag; shakeF=frames; }
    
    class Fruit {
      constructor() {
        this.radius = 30+Math.random()*18; this.scale = 0.05;
        this.isBomb = gameMode!=='zen' && Math.random()<0.12;
        this.sliced = false; this.alpha=1;
        const s=Math.random();
        if(s<0.33) { this.x=60+Math.random()*W*0.3; this.vx=(1.8+Math.random()*2.5)*speedMult; }
        else if(s<0.66) { this.x=W*0.3+Math.random()*W*0.4; this.vx=(Math.random()-0.5)*3.5*speedMult; }
        else { this.x=W*0.7+Math.random()*W*0.25; this.vx=-(1.8+Math.random()*2.5)*speedMult; }
        this.y=H+this.radius; this.vy=-(9+Math.random()*6)*speedMult;
        this.rot=Math.random()*Math.PI*2; this.rotSpd=(Math.random()-0.5)*0.07;
        if(!this.isBomb){ const t=CFG.fruits[Math.floor(Math.random()*CFG.fruits.length)]; this.emoji=t.emoji; this.color=t.color; this.shine=t.shine; this.pts=t.pts; }
        else { this.emoji='💣'; this.color='#1a1a2e'; this.shine='#5a5a7e'; this.pts=0; }
      }
      update() { this.vy+=CFG.gravity; this.x+=this.vx; this.y+=this.vy; this.rot+=this.rotSpd; if(this.scale<1) this.scale=Math.min(1,this.scale+0.1); if(this.sliced) this.alpha-=0.045; }
      isOff() { return this.y>H+this.radius+20; }
      draw() {
        ctx.save(); ctx.globalAlpha=this.alpha; ctx.translate(this.x,this.y); ctx.rotate(this.rot); ctx.scale(this.scale,this.scale);
        ctx.beginPath(); ctx.arc(0,0,this.radius*1.5,0,Math.PI*2); ctx.fillStyle=this.color+'55'; ctx.fill();
        ctx.beginPath(); ctx.arc(0,0,this.radius,0,Math.PI*2); ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=18; ctx.fill();
        ctx.beginPath(); ctx.ellipse(-this.radius*.25,-this.radius*.3,this.radius*.2,this.radius*.12,-0.4,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fill();
        ctx.font=`${this.radius*1.05}px "Segoe UI Emoji"`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.emoji,0,1); ctx.restore();
      }
      slice() { this.sliced=true; playSlice(); spawnParts(this.x,this.y,this.color,this.isBomb); addPopup(this.x,this.y-this.radius,this.isBomb?'💥 BOMB!':`+${this.pts}`); if(!this.isBomb){ const now=Date.now(); if(now - lastSliceTime < 500) combo++; else combo=1; lastSliceTime=now; score += this.pts * combo; updateScoreUI(); } else { triggerBomb(); } }
    }
    
    class Half { constructor(f,dir) { this.x=f.x;this.y=f.y;this.r=f.radius;this.color=f.color;this.shine=f.shine; this.dir=dir;this.vx=f.vx+dir*(2.5+Math.random()*3);this.vy=f.vy-1; this.rot=f.rot;this.rotSpd=f.rotSpd+dir*0.07;this.alpha=1; } update(){ this.vy+=CFG.gravity;this.x+=this.vx;this.y+=this.vy;this.rot+=this.rotSpd;this.alpha-=0.02; } draw(){ ctx.save(); ctx.globalAlpha=Math.max(0,this.alpha); ctx.translate(this.x,this.y); ctx.rotate(this.rot); ctx.beginPath(); ctx.rect(this.dir===-1?-this.r*2:0,-this.r,this.r,this.r*2); ctx.clip(); ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fillStyle=this.color; ctx.fill(); ctx.restore(); } gone(){ return this.alpha<=0||this.y>H+80; } }
    function spawnHalves(f){ halves.push(new Half(f,-1),new Half(f,+1)); }
    class Particle { constructor(x,y,color){ const a=Math.random()*Math.PI*2,spd=3+Math.random()*7; this.x=x;this.y=y;this.color=color; this.vx=Math.cos(a)*spd;this.vy=Math.sin(a)*spd-2; this.life=1;this.decay=0.025+Math.random()*0.025;this.size=4+Math.random()*6; } update(){ this.x+=this.vx;this.y+=this.vy;this.vy+=0.22;this.life-=this.decay;this.size*=0.97; } draw(){ ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=this.color;ctx.fill();ctx.restore(); } dead(){ return this.life<=0; } }
    function spawnParts(x,y,color,bomb){ for(let i=0;i<(bomb?38:CFG.particleCount);i++) parts.push(new Particle(x,y,bomb?(i%2?'#f39c12':'#e74c3c'):color)); }
    class Popup { constructor(x,y,text){ this.x=x;this.y=y;this.text=text;this.life=1;this.vy=-1.7; } update(){ this.y+=this.vy;this.life-=0.022; } draw(){ ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.font="bold 22px 'Orbitron',sans-serif";ctx.textAlign='center';ctx.fillStyle=this.text.includes('BOMB')?'#ff6b6b':'#f9ca24';ctx.fillText(this.text,this.x,this.y);ctx.restore(); } dead(){ return this.life<=0; } }
    function addPopup(x,y,t){ popups.push(new Popup(x,y,t)); }
    function addPt(x,y){ trail.push({x,y}); if(trail.length>CFG.trailLen) trail.shift(); }
    function drawTrail(){ if(trail.length<2) return; for(let i=1;i<trail.length;i++){ const p0=trail[i-1],p1=trail[i],t=i/trail.length; ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y); ctx.strokeStyle=`rgba(${120+135*t},${200+55*t},255,${t*0.9})`; ctx.lineWidth=3.5*t; ctx.stroke(); } }
    function hitTest(ax,ay,bx,by,cx,cy,r){ const dx=bx-ax,dy=by-ay,fx=ax-cx,fy=ay-cy,a=dx*dx+dy*dy; if(!a) return false; const b=2*(fx*dx+fy*dy),c=fx*fx+fy*fy-r*r; let d=b*b-4*a*c; if(d<0) return false; d=Math.sqrt(d); const t1=(-b-d)/(2*a),t2=(-b+d)/(2*a); return (t1>=0&&t1<=1)||(t2>=0&&t2<=1); }
    function checkSlice(){ if(trail.length<2||gameState!=='playing') return; const p0=trail[trail.length-2],p1=trail[trail.length-1]; for(let f of fruits) if(!f.sliced&&hitTest(p0.x,p0.y,p1.x,p1.y,f.x,f.y,f.radius)) f.slice(); }
    function triggerBomb(){ playBomb(); shake(16,22); combo=0; comboPanel.classList.add('hidden'); if(gameMode==='classic') loseLife(); }
    
    function scaleDiff(now){ const lvl=Math.floor((now-gameStartTime)/CFG.diffEvery); speedMult=1+lvl*0.18; spawnMin=Math.max(CFG.minSpawn, CFG.spawnMinBase-lvl*90); spawnMax=Math.max(CFG.minSpawn+200, CFG.spawnMaxBase-lvl*90); }
    function trySpawn(now){ if(now<nextSpawn) return; nextSpawn=now+spawnMin+Math.random()*(spawnMax-spawnMin); fruits.push(new Fruit()); if(Math.random()<0.2) setTimeout(()=>{ if(gameState==='playing') fruits.push(new Fruit()); },300); }
    
    function endGame(){
      gameState='over'; playGameOver();
      const key='fc_hs_'+gameMode; const best=+(localStorage.getItem(key)||0);
      if(score>best) localStorage.setItem(key,score);
      finalScoreEl.textContent=score; highScoreEl.textContent=Math.max(score,best);
      const info={ classic:{emoji:'💥',title:'GAME OVER',tag:'⚔️ CLASSIC'}, timeattack:{emoji:'⏱️',title:"TIME'S UP!",tag:'⏱️ TIME ATTACK'}, zen:{emoji:'🧘',title:'SESSION END',tag:'🧘 ZEN'} }[gameMode];
      resultEmoji.textContent=info.emoji; resultTitle.textContent=info.title; modeTag.textContent=info.tag;
      hudEl.classList.add('hidden'); gameOverScreen.classList.remove('hidden');
    }
    
    function startGame(mode){
      initAudio(); gameMode=mode; fruits=[]; parts=[]; halves=[]; juice=[]; popups=[]; trail=[]; score=0; combo=0; lives=CFG.maxLives; lastSliceTime=0; speedMult=1; spawnMin=CFG.spawnMinBase; spawnMax=CFG.spawnMaxBase; nextSpawn=0; shakeF=0; gameStartTime=performance.now();
      timerPanel.classList.toggle('hidden', gameMode!=='timeattack'); livesPanel.classList.toggle('hidden', gameMode!=='classic');
      if(gameMode==='timeattack') timerVal.textContent=TIME_ATTACK_SECS; updateLivesUI(); updateScoreUI(); comboPanel.classList.add('hidden'); startScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden'); hudEl.classList.remove('hidden'); gameState='playing';
    }
    
    function drawBg(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#07071a');g.addColorStop(.5,'#0c1a2e');g.addColorStop(1,'#07071a'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
    
    function loop(now){
      rafId=requestAnimationFrame(loop); drawBg();
      if(gameState!=='playing') return;
      scaleDiff(now); trySpawn(now);
      if(shakeF>0){ ctx.save(); ctx.translate((Math.random()-.5)*shakeMag*2,(Math.random()-.5)*shakeMag*2); shakeF--; }
      halves=halves.filter(h=>!h.gone()); halves.forEach(h=>{h.update();h.draw();});
      for(let i=fruits.length-1;i>=0;i--){ let f=fruits[i]; f.update(); if(f.isOff()){ if(!f.sliced && !f.isBomb && gameMode==='classic'){ combo=0;comboPanel.classList.add('hidden');playMiss();loseLife();addPopup(f.x,H-70,'MISSED!'); } fruits.splice(i,1); continue; } if(f.sliced&&f.alpha<=0){ fruits.splice(i,1); continue; } f.draw(); }
      parts=parts.filter(p=>!p.dead()); parts.forEach(p=>{p.update();p.draw();});
      popups=popups.filter(p=>!p.dead()); popups.forEach(p=>{p.update();p.draw();});
      drawTrail(); checkSlice();
      if(gameMode==='timeattack'){ const left=Math.max(0,TIME_ATTACK_SECS-(now-gameStartTime)/1000); timerVal.textContent=Math.ceil(left); timerVal.classList.toggle('urgent',left<=10); if(left<=0) endGame(); }
      if(combo>0 && Date.now()-lastSliceTime>600){ combo=0; comboPanel.classList.add('hidden'); }
      if(shakeF===0&&shakeMag>0){ ctx.restore(); shakeMag=0; } else if(shakeF>0) ctx.restore();
    }
    
    document.querySelectorAll('.mode-card').forEach(btn=>btn.addEventListener('click',()=>startGame(btn.dataset.mode)));
    document.getElementById('restartBtn').addEventListener('click',()=>startGame(gameMode));
    document.getElementById('menuBtn').addEventListener('click',()=>{ gameState='start'; gameOverScreen.classList.add('hidden'); startScreen.classList.remove('hidden'); });
    canvas.addEventListener('mousedown',()=>{ isSlicing=true; trail=[]; }); canvas.addEventListener('mouseup',()=>{ isSlicing=false; trail=[]; }); canvas.addEventListener('mouseleave',()=>{ isSlicing=false; trail=[]; });
    canvas.addEventListener('mousemove',e=>{ if(isSlicing&&gameState==='playing') addPt(e.clientX,e.clientY); });
    canvas.addEventListener('touchstart',e=>{ e.preventDefault(); isSlicing=true; trail=[]; },{passive:false});
    canvas.addEventListener('touchend',e=>{ e.preventDefault(); isSlicing=false; trail=[]; },{passive:false});
    canvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(gameState==='playing') addPt(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
    rafId=requestAnimationFrame(loop);
  </script>
</body>
</html>
